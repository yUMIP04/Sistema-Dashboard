<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <link rel="stylesheet" href="{{ url_for('static', filename='inicio_sesion.css') }}">
    <title>Inicio de Sesion</title>
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">
    
    <div class="form-container col-11 col-md-6 col-lg-4 border p-4 shadow-sm rounded">
        
        <div class="titulo-container mb-4">
            <h1 class="titulo h3">Inicio de Sesion</h1>
        </div>

        <form action="/" method="post">
            <div class="mb-3">
                <label for="nombre" class="form-label">Usuario:</label>
                <input type="text" placeholder="Ingresa tu nombre" class="form-control" name="nombre" id="nombre" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Clave:</label>
                <input type="password" class="form-control" placeholder="Ingresa tu clave" name="password" id="password" required>
            </div>

            <div class="d-grid gap-2">
                <input type="submit" class="btn btn-outline-primary btn-lg" value="Ingresar" name="enviar">
            </div>
        </form>
    </div>
</div>
    
  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
